<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Testimonio: uno</title>

  <link rel="stylesheet" href="style.css?v=6">
</head>

<body class="inner-page testimony-page">

  <main class="inner-layout">

    <!-- Page title and return link -->
    <div class="inner-top">

      <header class="inner-header">
        <h1>Testimonio: uno</h1>

        <a class="home-button" href="testimonies.html">
          Testimonios
        </a>
      </header>

      <hr class="inner-divider inner-divider-top">

    </div>

    <!-- Scrollable testimony content -->
    <article class="testimony-content">

      <!-- Video -->
      <section class="testimony-video-section">

        <video
          class="testimony-video"
          controls
          playsinline
          preload="metadata"
        >
          <source src="videos/T2-02.mp4" type="video/mp4">

          Your browser does not support the video element.
        </video>

      </section>

      <!-- Image gallery -->
      <section
        class="testimony-gallery"
        aria-label="Typed Testimony Extract"
      >

        <figure class="testimony-gallery-item">
          <img
            src="imgs/Testimonio-4-Original-04.jpg"
            alt="Material visual relacionado con el testimonio uno"
          >
        </figure>
<!-- 
        <figure class="testimony-gallery-item">
          <img
            src="imgs/uno-2.jpg"
            alt="Segunda imagen relacionada con el testimonio uno"
          >
        </figure>

        <figure class="testimony-gallery-item">
          <img
            src="imgs/uno-3.jpg"
            alt="Tercera imagen relacionada con el testimonio uno"
          >
        </figure> -->

      </section>

    </article>

    <!-- Bottom divider -->
    <hr class="inner-divider inner-divider-bottom">

    <!-- Decorative image -->
    <div class="metal-object-container" aria-hidden="true">
      <img
        class="metal-object"
        src="imgs/metal-object.png"
        alt=""
      >
    </div>

  </main>

</body>
</html>
