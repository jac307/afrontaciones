<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Testimonio: uno</title>

  <link rel="stylesheet" href="../style.css?v=7">
</head>

<body class="inner-page testimony-page">

  <main class="inner-layout">

    <!-- Page title and return link -->
    <div class="inner-top">

      <header class="inner-header">
        <h1>Testimonio: uno</h1>

        <a class="home-button" href="../testimonies.html">
          Testimonios
        </a>
      </header>

      <hr class="inner-divider inner-divider-top">

    </div>

    <!-- Scrollable central content -->
    <article class="testimony-content">

      <h2 class="testimony-section-title">
        Testimony extract
      </h2>

      <!-- Typed testimony images -->
      <section
        class="testimony-gallery"
        aria-label="Typed testimony"
      >

        <figure class="testimony-gallery-item">
          <img
            src="imgs/Testimonio-1-Original-04.jpg"
            alt="First page of the typed testimony"
          >
        </figure>

        <figure class="testimony-gallery-item">
          <img
            src="imgs/Testimonio-1-Original-05.jpg"
            alt="Second page of the typed testimony"
          >
        </figure>

      </section>

    </article>

    <!-- Bottom divider -->
    <hr class="inner-divider inner-divider-bottom">

    <!-- Decorative image -->
    <div class="metal-object-container" aria-hidden="true">
      <img
        class="metal-object"
        src="../imgs/metal-object.png"
        alt=""
      >
    </div>

  </main>

</body>
</html>
