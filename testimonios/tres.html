<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Testimonies</title>

  <link rel="stylesheet" href="../style.css">
</head>

<body class="inner-page testimonies-page">

  <main class="inner-layout">

    <div class="inner-top">

      <header class="inner-header">
        <h1>Testimonio: tres</h1>

        <a class="home-button" href="../testimonies.html">
          Testimonios
        </a>
      </header>

      <hr class="inner-divider inner-divider-top">

    </div>

    <!-- Scrollable testimony content -->
    <article class="testimony-content">

      <!-- Video -->
      <section class="testimony-video-section">

        <h2 class="testimony-section-title">
          Testimony extract
        </h2>

        <video
          class="testimony-video"
          controls
          playsinline
          preload="metadata"
        >
          <source src="videos/T3-02.mp4" type="video/mp4">

          Your browser does not support the video element.
        </video>

      </section>

      <!-- Credits -->
      <section class="testimony-credits" aria-label="Credits">

        <p>
          Testimony shared anonymously.
        </p>

        <p>
          English Voice by Mariana Fonseca Hernández, Christian Downey-Acevedo, 
          and Charlotte Payne.
        </p>

        <p>
          Transcription, translation, editing, and visual composition by
          Jessica A. Rodriguez.
        </p>

      </section> 


    </article>

    <hr class="inner-divider inner-divider-bottom">

    <div class="metal-object-container" aria-hidden="true">
      <img
        class="metal-object"
        src="../imgs/metal-object.png"
        alt=""
      >
    </div>

  </main>

</body>
</html>
